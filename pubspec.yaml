name: rfid_sample_flutter
description: "Flutter RFID + Barcode sample app for Zebra TC-series devices using RFID SDK3 + BarcodeScanner SDK."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Flutter Hooks - React-style state management with useState, useEffect, etc.
  flutter_hooks: ^0.20.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true